[env:esp8266]
platform  = espressif8266
board     = esp12e
framework = arduino

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    esphome/ESPAsyncTCP-esphome @ ^2.0.0
    bblanchon/ArduinoJson @ ^7.4.1

monitor_speed = 115200

; Build flags: Parâmetros globais do sistema
build_flags =
    -D WIFI_SSID=\"NomeDoHotspot\"
    -D WIFI_PASS=\"SenhaDoHotspot\"
    -D LIMITE_NIVEL=500
    -D INTERVALO_LEITURA=1000