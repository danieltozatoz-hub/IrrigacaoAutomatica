[env:esp8266]
platform  = espressif8266
board     = esp12e
framework = arduino

lib_deps =
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    esphome/ESPAsyncTCP-esphome @ ^2.0.0
    bblanchon/ArduinoJson @ ^7.4.1

monitor_speed = 115200

build_flags =
    -D WIFI_SSID=\"NomeDaSuaRede\"
    -D WIFI_PASS=\"SuaSenhaWifi\"
    -D LIMITE_SECO=600
    -D HISTERESE=50
    -D TEMPO_MAX_BOMBA=30000
    -D INTERVALO_LEITURA=1000